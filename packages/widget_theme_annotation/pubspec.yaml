name: widget_theme_annotation
description: >
  Annotation definitions for widget_theme, used to
  mark Flutter widgets for automatic theme model generation.
version: 0.1.0
repository: https://github.com/albinpk/widget_theme
issue_tracker: https://github.com/albinpk/widget_theme/issues

environment:
  sdk: ^3.11.1
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter

topics:
  - codegen
  - theming
  - flutter
  - ui
  - developer-tools
