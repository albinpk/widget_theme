name: widget_theme
description: >
  Code generation utilities for creating widget-specific theme models from
  Flutter widget properties, enabling scalable and consistent theming.
version: 0.1.0-dev.6
repository: https://github.com/albinpk/widget_theme
issue_tracker: https://github.com/albinpk/widget_theme/issues

environment:
  sdk: ^3.11.1

resolution: workspace

dependencies:
  analyzer: ">=7.0.0 <11.0.0"
  build: ">=3.0.0 <5.0.0"
  code_builder: ^4.0.0
  dart_style: ^3.0.0
  source_gen: ">=3.0.0 <5.0.0"
  widget_theme_annotation: ^0.1.0-dev.3

dev_dependencies:
  flutter:
    sdk: flutter
  source_gen_test: ^1.3.5
  test: ^1.25.6
